name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      ANTHROPIC_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        run: npm run security:secrets 2>&1 | tee secret-scan.log

      - name: Lint
        run: npm run lint 2>&1 | tee lint.log

      - name: Tests
        run: npm test 2>&1 | tee tests.log

      - name: Production build
        run: npm run build 2>&1 | tee build.log

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.run_id }}
          path: |
            secret-scan.log
            lint.log
            tests.log
            build.log
          if-no-files-found: ignore
          retention-days: 3
